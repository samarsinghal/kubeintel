apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeintel.fullname" . }}
  labels:
    {{- include "kubeintel.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kubeintel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kubeintel.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubeintel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - -m
            - src.main
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: AGENT_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: AGENT_LOG_FORMAT
              value: {{ .Values.config.logFormat | quote }}
            - name: AGENT_KUBERNETES_CONFIG
              value: {{ .Values.config.kubernetesConfig | quote }}
            - name: AGENT_HOST
              value: {{ .Values.config.host | quote }}
            - name: AGENT_PORT
              value: {{ .Values.config.port | quote }}
            - name: AGENT_MAX_EVENTS
              value: {{ .Values.config.maxEvents | quote }}
            - name: AGENT_MAX_LOG_LINES
              value: {{ .Values.config.maxLogLines | quote }}
            - name: AGENT_ANALYSIS_TIMEOUT
              value: {{ .Values.config.analysisTimeout | quote }}
            # AWS Strands configuration
            - name: AGENT_STRANDS_REGION
              value: {{ .Values.config.strands.region | quote }}
            - name: AGENT_STRANDS_MODEL
              value: {{ .Values.config.strands.model | quote }}
            - name: AGENT_STRANDS_SESSION_TTL
              value: {{ .Values.config.strands.sessionTtl | quote }}
            {{- if .Values.config.strands.endpoint }}
            - name: AGENT_STRANDS_ENDPOINT
              value: {{ .Values.config.strands.endpoint | quote }}
            {{- end }}
            # Streaming fix configuration
            - name: AGENT_STRANDS_DISABLE_STREAMING
              value: {{ .Values.config.strands.disableStreaming | default true | quote }}
            - name: AGENT_STRANDS_FALLBACK_MODEL
              value: {{ .Values.config.strands.fallbackModel | default "anthropic.claude-3-haiku-20240307-v1:0" | quote }}
            # AWS configuration
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            {{- if .Values.config.strands.useVpcEndpoints }}
            - name: AWS_USE_VPC_ENDPOINTS
              value: "true"
            - name: AWS_BEDROCK_ENDPOINT_URL
              value: "https://bedrock-runtime.{{ .Values.aws.region }}.amazonaws.com"
            {{- end }}
            {{- if .Values.aws.roleArn }}
            - name: AWS_ROLE_ARN
              value: {{ .Values.aws.roleArn | quote }}
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
            {{- end }}
            # AWS Credentials
            {{- if .Values.aws.accessKeyId }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.aws.accessKeyId | quote }}
            {{- end }}
            {{- if .Values.aws.secretAccessKey }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.aws.secretAccessKey | quote }}
            {{- end }}
            {{- if .Values.aws.sessionToken }}
            - name: AWS_SESSION_TOKEN
              value: {{ .Values.aws.sessionToken | quote }}
            {{- end }}
            # Additional environment variables
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if eq .Values.config.kubernetesConfig "in-cluster" }}
          volumeMounts:
            - name: kubernetes-config
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
            - name: agent-config
              mountPath: /app/config
              readOnly: true
            {{- if .Values.aws.roleArn }}
            - name: aws-iam-token
              mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
              readOnly: true
            {{- end }}
          {{- else }}
          volumeMounts:
            - name: agent-config
              mountPath: /app/config
              readOnly: true
          {{- end }}
      {{- if eq .Values.config.kubernetesConfig "in-cluster" }}
      volumes:
        - name: kubernetes-config
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3600
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
        - name: agent-config
          configMap:
            name: {{ include "kubeintel.fullname" . }}-config
        {{- if .Values.aws.roleArn }}
        - name: aws-iam-token
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 86400
                  path: token
                  audience: sts.amazonaws.com
        {{- end }}
      {{- else }}
      volumes:
        - name: agent-config
          configMap:
            name: {{ include "kubeintel.fullname" . }}-config
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
